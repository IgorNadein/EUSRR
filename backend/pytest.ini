[pytest]
DJANGO_SETTINGS_MODULE = eusrr_backend.settings
python_files = tests.py test_*.py *_tests.py

# Asyncio mode
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers для категоризации тестов
markers =
    manual: marks tests as manual (not run by default)
    integration: marks tests as integration tests
    slow: marks tests as slow running
    asyncio: marks tests as asynchronous tests
    ldap_required: тест требует работающий LDAP сервер
    ldap_optional: тест может работать с LDAP и без него (параметризован)

# Исключить manual tests по умолчанию
addopts = -m "not manual" --strict-markers

# Пути для сбора тестов
testpaths = tests employees

# Игнорировать директории
norecursedirs = .git .venv __pycache__ node_modules staticfiles media scripts tests/manual

# Опции для вывода
console_output_style = progress
