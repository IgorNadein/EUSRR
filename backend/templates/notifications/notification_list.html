{% extends "base.html" %}
{% load static %}

{% block title %}Уведомления{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/notifications/notifications.css' %}">
{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2><i class="bi-bell"></i> Уведомления</h2>
                <div class="btn-group">
                    <button id="markAllReadBtn" class="btn btn-outline-primary">
                        <i class="bi-check-all"></i> Отметить все прочитанными
                    </button>
                    <a href="{% url 'notifications:settings' %}" class="btn btn-outline-secondary">
                        <i class="bi-gear"></i> Настройки
                    </a>
                </div>
            </div>
            
            <!-- Фильтры и поиск -->
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-3">
                            <label for="categoryFilter" class="form-label">Категория</label>
                            <select id="categoryFilter" class="form-select">
                                <option value="">Все категории</option>
                                <option value="communications">💬 Коммуникации</option>
                                <option value="documents">📄 Документы</option>
                                <option value="requests">📋 Заявления</option>
                                <option value="calendar">📅 Календарь</option>
                                <option value="department">👥 Отдел</option>
                                <option value="profile">👤 Профиль</option>
                                <option value="feed">📰 Новости</option>
                                <option value="system">⚙️ Система</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label for="statusFilter" class="form-label">Статус</label>
                            <select id="statusFilter" class="form-select">
                                <option value="">Все</option>
                                <option value="false">Непрочитанные</option>
                                <option value="true">Прочитанные</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="notificationSearch" class="form-label">Поиск</label>
                            <div class="input-group">
                                <input type="text" id="notificationSearch" class="form-control" 
                                       placeholder="Поиск по заголовку или тексту...">
                                <button id="searchBtn" class="btn btn-primary">
                                    <i class="bi-search"></i> Найти
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- Список уведомлений -->
            <div id="notificationListContainer">
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Загрузка...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% csrf_token %}
{% endblock %}

{% block extra_js %}
<script src="{% static 'js/notifications/notification-list.js' %}"></script>
{% endblock %}
