{% extends 'base.html' %}
{% load static %}

{% block title %}Пароль изменен{% endblock %}

{% block content %}
<div class="row justify-content-center">
 <div class="col-lg-6">
 <div class="card shadow">
 <div class="card-header bg-success text-white">
 <h3 class="mb-0">Успешная смена пароля</h3>
 </div>
 <div class="card-body text-center">
 <i class="bi bi-check-circle-fill text-success display-4 mb-4"></i>
 <p class="lead">Ваш пароль был успешно изменен!</p>
 <a href="{% url 'auth_front:login' %}" class="btn btn-primary">
 <i class="bi bi-box-arrow-in-right me-2"></i>Войти с новым паролем
 </a>
 </div>
 </div>
 </div>
</div>
{% endblock %}
