{% load static %}
<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <title>Подтверждение выхода</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- если используешь bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="container py-5">
    <div class="card shadow-sm mx-auto" style="max-width:480px;">
      <div class="card-body">
        <h1 class="h4 mb-3">Выйти из аккаунта?</h1>
        <p class="text-secondary mb-4">Вы уверены, что хотите завершить сеанс?</p>

        <form method="post">
          {% csrf_token %}
          {% if next %}
            <input type="hidden" name="next" value="{{ next }}">
          {% else %}
            <input type="hidden" name="next" value="{% url 'auth_front:login' %}">
          {% endif %}

          <div class="d-flex gap-2">
            <a href="javascript:history.back()" class="btn btn-outline-secondary">Отмена</a>
            <button type="submit" class="btn btn-danger">Выйти</button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
