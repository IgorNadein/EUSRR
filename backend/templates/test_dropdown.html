<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест Bootstrap Dropdown</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <h1>Тест Bootstrap Dropdown</h1>
        
        <div class="dropdown mt-4">
            <button class="btn btn-secondary dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-expanded="false">
                Dropdown button
            </button>
            <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                <li><a class="dropdown-item" href="#">Action</a></li>
                <li><a class="dropdown-item" href="#">Another action</a></li>
                <li><a class="dropdown-item" href="#">Something else here</a></li>
            </ul>
        </div>

        <div id="status" class="mt-4">
            <p>Проверка Bootstrap JS: <span id="bootstrap-status">...</span></p>
            <p>Версия Bootstrap: <span id="bootstrap-version">...</span></p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const statusEl = document.getElementById('bootstrap-status');
            const versionEl = document.getElementById('bootstrap-version');
            
            if (window.bootstrap) {
                statusEl.textContent = '✓ Загружен';
                statusEl.style.color = 'green';
                versionEl.textContent = bootstrap.Dropdown ? 'Dropdown доступен' : 'Dropdown НЕ доступен';
            } else {
                statusEl.textContent = '✗ НЕ загружен';
                statusEl.style.color = 'red';
            }
        });
    </script>
</body>
</html>
