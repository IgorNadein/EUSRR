{% extends 'base.html' %}
{% load static %}

{% block title %}Новый пароль{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Установка нового пароля</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <div class="form-floating">
                            {{ form.new_password1 }}
                            <label for="{{ form.new_password1.id_for_label }}">Новый пароль</label>
                        </div>
                    </div>
                    <div class="mb-3">
                        <div class="form-floating">
                            {{ form.new_password2 }}
                            <label for="{{ form.new_password2.id_for_label }}">Подтвердите пароль</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100">
                        <i class="bi bi-key me-2"></i>Установить пароль
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
