{% extends 'base.html' %}
{% load static %}

{% block title %}Письмо отправлено{% endblock %}

{% block content %}
<div class="row justify-content-center">
 <div class="col-lg-6">
 <div class="card shadow">
 <div class="card-header bg-info text-white">
 <h3 class="mb-0">Инструкции отправлены</h3>
 </div>
 <div class="card-body text-center">
 <i class="bi bi-envelope-check-fill text-info display-4 mb-4"></i>
 <p class="lead">
 На ваш email отправлены инструкции по сбросу пароля.
 Проверьте почту и следуйте указаниям в письме.
 </p>
 <a href="{% url 'login' %}" class="btn btn-primary">
 <i class="bi bi-arrow-left me-2"></i>Вернуться к авторизации
 </a>
 </div>
 </div>
 </div>
</div>
{% endblock %}
