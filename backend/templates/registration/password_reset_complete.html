{% extends 'base.html' %}
{% load static %}

{% block title %}Пароль восстановлен{% endblock %}

{% block content %}
<div class="row justify-content-center">
 <div class="col-lg-6">
 <div class="card shadow">
 <div class="card-header bg-success text-white">
 <h3 class="mb-0">Пароль успешно изменен</h3>
 </div>
 <div class="card-body text-center">
 <i class="bi bi-shield-check text-success display-4 mb-4"></i>
 <p class="lead">Ваш новый пароль был установлен. Теперь вы можете войти в систему.</p>
 <a href="{% url 'login' %}" class="btn btn-primary btn-lg">
 <i class="bi bi-box-arrow-in-right me-2"></i>Войти в систему
 </a>
 </div>
 </div>
 </div>
</div>
{% endblock %}
