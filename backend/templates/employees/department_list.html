{% extends "base.html" %}
{% load static django_bootstrap5 %}

{% block title %}Отделы{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/components/ios-search.css' %}">
<style>
  /* ios-search стили теперь в static/css/components/ios-search.css */

  .feed-header { gap:.6rem; flex-wrap:wrap; }

  /* список — единственный прокручиваемый блок */
  #deptList{
    max-height: calc(100dvh - var(--navbar-h) - 160px);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #deptList .dept-row{ padding:.6rem .75rem; }
  #deptList .dept-row + .dept-row{ border-top:1px solid var(--bs-border-color); }
  .feed-author{ font-weight:700; }
  .feed-sub{ color:var(--bs-secondary-color); }
{% endblock %}

{% block content %}
<div class="container">
  <div class="row gx-0"> 
      <div class="col-12">

      <div class="feed-header d-flex align-items-center">
        <i class="bi-diagram-3 fs-2 text-primary"></i>
        <h2 class="title mb-0">Отделы</h2>
        <span class="ms-2 small text-secondary">Всего: {{ departments|length }}</span>
        <div class="ms-auto ios-search">
          <div class="ios-search">
            <i class="bi-search"></i>
            <input id="deptFilter" type="search" class="ios-search-input"
                   placeholder="Поиск по названию или руководителю" autocomplete="off">
            <button type="button" class="ios-search-clear" aria-label="Очистить">
              <i class="bi-x-lg"></i>
            </button>
          </div>
        </div>
      </div>
      {% if can_create_departments or perms.employees.add_department or request.user.is_staff or request.user.is_superuser %}
        <div class="feed-card mb-2">
          <a href="{% url 'employees:department_create' %}"
            class="dept-row d-flex w-100 justify-content-center align-items-center gap-2 text-decoration-none"
            role="button" aria-label="Создать отдел">
            <span class="feed-author">Создать отдел</span>
            <i class="bi-plus-lg"></i>
          </a>
        </div>
      {% endif %}
      <div class="feed-card">
        <div id="deptList" class="py-1">
          {# поддержка обоих форматов: dict(results) или list #}
          {% with rows=departments.results|default:departments %}
            {% for dept in rows %}
              {% with h=dept.head emp=dept.employees_count|default:0 %}
                {% url 'employees:department_detail' dept.id as dept_url %}
                <div class="dept-row d-flex align-items-start gap-2"
                     data-haystack="{{ dept.name }}{% if h %} {{ h.last_name }}{% if h.first_name %} {{ h.first_name }}{% endif %}{% endif %}"
                     data-emp="{{ emp }}">
                  <div class="flex-grow-1 position-relative">
                    <div class="d-flex align-items-center gap-2 flex-wrap">
                      {% if dept_url %}
                        <a href="{{ dept_url }}" class="feed-author text-decoration-none stretched-link">
                          {{ dept.name }}
                        </a>
                      {% else %}
                        <span class="feed-author">{{ dept.name }}</span>
                      {% endif %}
                    </div>
                    <div class="feed-sub mt-1">
                      {% if h %}
                        Руководитель: {{ h.last_name }}{% if h.first_name %} {{ h.first_name }}{% endif %}
                      {% endif %}
                      {% if h and emp %} · {% endif %}
                      {% if emp %}{{ emp }} сотрудников{% endif %}
                    </div>
                  </div>
                  {% if dept_url %}
                    <i class="bi-chevron-right text-secondary ms-2 mt-1"></i>
                  {% endif %}
                </div>
              {% endwith %}
            {% empty %}
              <div class="p-3 text-secondary">Отделов пока нет.</div>
            {% endfor %}
          {% endwith %}
        </div>
      </div>

      <div class="mt-3 text-secondary small">
        Всего сотрудников: <span id="empTotal">0</span>
      </div>

    </div>
  </div>
</div>

<script>
  (function(){
    const input    = document.getElementById('deptFilter');
    const clearBtn = document.querySelector('.ios-search-clear');
    const list     = document.getElementById('deptList');
    const totalEmpEl  = document.getElementById('empTotal');

    // (опционально) счётчик отделов
    const totalDeptBadge = document.querySelector('.title ~ .ms-2.small span'); // "Всего: {{ departments|length }}"
    const allRows = Array.from(list.querySelectorAll('.dept-row'));

    // сообщение "нет результатов"
    let emptyNotice = document.getElementById('deptEmptyNotice');
    if (!emptyNotice){
      emptyNotice = document.createElement('div');
      emptyNotice.id = 'deptEmptyNotice';
      emptyNotice.className = 'p-3 text-secondary d-none';
      emptyNotice.textContent = 'Ничего не найдено.';
      list.appendChild(emptyNotice);
    }

    function showRow(row){
      // вернём normal display и d-flex
      row.style.removeProperty('display');
      if (!row.classList.contains('d-flex')) row.classList.add('d-flex');
    }
    function hideRow(row){
      // снимем d-flex (чтобы не конкурировал) и зададим inline !important
      row.classList.remove('d-flex');
      row.style.setProperty('display', 'none', 'important');
    }

    function normalize(s){
      return (s || '').toLowerCase().trim();
    }

    function apply(){
      const q = normalize(input?.value);
      let totalEmp = 0;
      let shown = 0;

      for (const r of allRows){
        const hay = normalize(r.getAttribute('data-haystack'));
        const match = !q || hay.includes(q);

        if (match){
          showRow(r);
          shown += 1;
          totalEmp += (parseInt(r.getAttribute('data-emp')) || 0);
        } else {
          hideRow(r);
        }
      }

      // переключаем "нет результатов"
      emptyNotice.classList.toggle('d-none', shown > 0);

      // обновляем счетчики
      if (totalEmpEl) totalEmpEl.textContent = String(totalEmp);
      if (totalDeptBadge) totalDeptBadge.textContent = String(shown);
    }

    // первичная инициализация
    apply();

    // события
    input?.addEventListener('input', apply);
    clearBtn?.addEventListener('click', () => { input.value=''; input.focus(); apply(); });
  })();
</script>

{% endblock %}
