{% extends "base.html" %}
{% load static django_bootstrap5 %}

{% block title %}Редактирование профиля{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-lg-8 col-xl-7">

      <h3 class="mb-3">Редактирование профиля</h3>

      <form method="post" enctype="multipart/form-data" class="card">
        <div class="card-body">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-md-4">
              <label class="form-label">Фамилия</label>
              <input name="last_name" class="form-control" value="{{ emp.last_name }}">
            </div>
            <div class="col-md-4">
              <label class="form-label">Имя</label>
              <input name="first_name" class="form-control" value="{{ emp.first_name }}">
            </div>
            <div class="col-md-4">
              <label class="form-label">Отчество</label>
              <input name="patronymic" class="form-control" value="{{ emp.patronymic }}">
            </div>

            <div class="col-md-4">
              <label class="form-label">Пол</label>
              <select name="gender" class="form-select">
                <option value="" {% if not emp.gender %}selected{% endif %}>—</option>
                <option value="1" {% if emp.gender == 1 %}selected{% endif %}>Мужской</option>
                <option value="2" {% if emp.gender == 2 %}selected{% endif %}>Женский</option>
              </select>
            </div>

            <div class="col-md-4">
              <label class="form-label">Дата рождения</label>
              <input type="date" name="birth_date" class="form-control" value="{{ emp.birth_date }}">
            </div>

            <div class="col-md-4">
              <label class="form-label">Должность (id)</label>
              <input name="position" class="form-control" value="{{ emp.position|default:'' }}">
            </div>

            <div class="col-md-4">
              <label class="form-label">Telegram</label>
              <input name="telegram" class="form-control" value="{{ emp.telegram }}">
            </div>
            <div class="col-md-4">
              <label class="form-label">WhatsApp</label>
              <input name="whatsapp" class="form-control" value="{{ emp.whatsapp }}">
            </div>
            <div class="col-md-4">
              <label class="form-label">WeChat</label>
              <input name="wechat" class="form-control" value="{{ emp.wechat }}">
            </div>

            <div class="col-md-12">
              <label class="form-label">Навыки (id через Ctrl/⌘)</label>
              <select name="skills" class="form-select" multiple>
                {% comment %}
                  Тут можно подставить реальные варианты, если передать их из вьюхи.
                  Пока оставим пустой селект — API всё равно примет список ids.
                {% endcomment %}
              </select>
            </div>

            <div class="col-md-6">
              <label class="form-label">Аватар</label>
              <input type="file" name="avatar" class="form-control">
              {% if emp.avatar %}
                <div class="form-check mt-1">
                  <input class="form-check-input" type="checkbox" name="clear_avatar" id="clearAvatar">
                  <label class="form-check-label" for="clearAvatar">Удалить текущий</label>
                </div>
              {% endif %}
            </div>
          </div>
        </div>

        <div class="card-footer d-flex justify-content-end gap-2">
          <a href="{% if emp.id %}{% url 'employees:employee_detail' emp.id %}{% else %}{% url 'employees:employees_list' %}{% endif %}"
             class="btn btn-outline-secondary">Отмена</a>
          <button class="btn btn-primary" type="submit">Сохранить</button>
        </div>
      </form>

    </div>
  </div>
</div>
{% endblock %}
