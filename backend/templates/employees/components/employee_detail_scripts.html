{% load static %}
{# === JavaScript для страницы детального просмотра сотрудника === #}

<script src="{% static 'js/components/postDetailModal.js' %}"></script>
<script src="{% static 'js/components/feedLikes.js' %}"></script>
<script src="{% static 'js/components/feedComments.js' %}"></script>

<script type="module">
  import { initSkillsManager } from '{% static "js/components/skillsManager.js" %}';
  import { initDeptRoleEditor } from '{% static "js/components/deptRoleEditor.js" %}';
  import { initEmployeeForm } from '{% static "js/components/employeeFormHandler.js" %}';
  import { smoothScrollTo } from '{% static "js/utils/scroll.js" %}';
  import { initEmployeeProfile } from '{% static "js/components/employeeProfile.js" %}';

  document.addEventListener('DOMContentLoaded', () => {
    // 0. Загрузка данных профиля через AJAX (аватар и посты с правильными URL)
    const employeeId = '{{ emp.id }}';
    if (employeeId) {
      initEmployeeProfile(employeeId, {
        avatarContainer: '#employeeAvatar',
        nameContainer: '#employeeName',
        postsContainer: '#employeePosts'
      });
    }

    // 1. Обработчик формы редактирования профиля
    const employeeForm = initEmployeeForm();
    console.log('[employee_detail_scripts] employeeForm initialized:', employeeForm);

    // 2. Менеджер навыков
    const skillsManager = initSkillsManager({
      blockId: 'skillsBlock',
      formId: 'skillAddForm',
      collapseId: 'skillsForm',
      removeUrl: "{% url 'employees:skill_remove' emp.id %}"
    });

    // 3. Редакторы ролей в отделах
    const deptRoleEditor = initDeptRoleEditor();

    // 3. Smooth scroll к форме редактирования на мобильных
    const editWrap = document.getElementById('editFormWrap');
    if (editWrap) {
      const isMobile = () => window.matchMedia('(max-width: 767.98px)').matches;
      
      function getHeaderOffset() {
        const sticky = document.querySelector('.ios-header');
        return (sticky?.offsetHeight || 0) + 8;
      }

      editWrap.addEventListener('shown.bs.collapse', () => {
        if (isMobile()) {
          smoothScrollTo(editWrap, { offset: getHeaderOffset() });
        }
      });

      // Если форма уже открыта при загрузке
      if (editWrap.classList.contains('show') && isMobile()) {
        setTimeout(() => smoothScrollTo(editWrap, { offset: getHeaderOffset() }), 50);
      }
    }

    // Экспорт в window для отладки
    if (employeeForm) window.employeeForm = employeeForm;
    if (skillsManager) window.skillsManager = skillsManager;
    if (deptRoleEditor) window.deptRoleEditor = deptRoleEditor;

    // 4. Обработчик клика на аватар для просмотра увеличенной версии
    const avatarModal = document.getElementById('avatarModal');
    if (avatarModal) {
      avatarModal.addEventListener('show.bs.modal', (event) => {
        // Получаем элемент, который вызвал модалку
        const button = event.relatedTarget;
        if (button && button.dataset.avatarUrl) {
          const modalImage = avatarModal.querySelector('#avatarModalImage');
          if (modalImage) {
            modalImage.src = button.dataset.avatarUrl;
          }
        }
      });
    }
  });
</script>
