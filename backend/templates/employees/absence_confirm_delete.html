{% extends "base.html" %}

{% block title %}Удаление отсутствия{% endblock %}

{% block content %}
<div class="container" style="max-width:720px;">
  <div class="card shadow-sm">
    <div class="card-body">
      <h4 class="mb-3">Удалить запись об отсутствии?</h4>
      <p class="text-muted">
        Период: {{ object.date_from }} — {{ object.date_to }}.
      </p>
      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger">Удалить</button>
          <a href="{% url 'employees:absence_list' %}" class="btn btn-outline-secondary">Отмена</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
