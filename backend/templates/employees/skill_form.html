{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %}{% if object %}Правка навыка{% else %}Новый навык{% endif %}{% endblock %}

{% block content %}
<div class="container" style="max-width:720px;">
  <h3 class="mb-4">{% if object %}Правка навыка{% else %}Новый навык{% endif %}</h3>
  <form method="post">
    {% csrf_token %}
    {% bootstrap_form form %}
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Сохранить</button>
      <a href="{% url 'employees:skill_list' %}" class="btn btn-outline-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
