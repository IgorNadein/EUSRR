{% extends "base.html" %}
{% load django_bootstrap5 %}

{% block title %}Пригласить в отдел{% endblock %}

{% block content %}
<div class="container" style="max-width:720px;">
  <h3 class="mb-4">Пригласить сотрудника в отдел «{{ department.name }}»</h3>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Сотрудник</label>
      <select name="employee_id" class="form-select" required>
        <option value="" selected disabled>Выберите сотрудника</option>
        {% for e in employees %}
          <option value="{{ e.pk }}">{{ e.get_full_name|default:e }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">Пригласить</button>
      <a href="{% url 'employees:department_detail' department.pk %}" class="btn btn-outline-secondary">Отмена</a>
    </div>
  </form>
</div>
{% endblock %}
