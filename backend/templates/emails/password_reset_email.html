<!doctype html>
<html lang="ru">
  <body style="font-family:Arial,Helvetica,sans-serif; line-height:1.5; color:#111;">
    <h2>Сброс пароля</h2>
    <p>Здравствуйте {{ user.get_full_name|default_if_none:"" }}!</p>
    <p>Перейдите по ссылке для смены пароля:</p>
    <div style="font-size:24px; font-weight:700; letter-spacing:4px; padding:12px 0;">
      {{ protocol }}://{{ domain }}{% url 'auth_front:password_reset_confirm' uidb64=uid token=token %}
    </div>
    <hr style="border:none; border-top:1px solid #ddd; margin:16px 0;">
    <p style="font-size:12px; color:#666;">Если вы не запрашивали сброс пароля, просто игнорируйте это письмо.</p>
  </body>
</html>
