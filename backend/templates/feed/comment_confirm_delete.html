{% extends "base.html" %}

{% block title %}Удалить комментарий{% endblock %}

{% block content %}
<div class="container">
  <div class="card p-3 shadow-sm">
    <h5 class="mb-3">Удалить комментарий?</h5>
    <p class="text-muted mb-3">{{ comment.text }}</p>
    <form method="post" class="d-flex gap-2">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Удалить</button>
      <a class="btn btn-secondary" href="{% url 'feed:post_detail' post.pk %}#c{{ comment.pk }}">Отмена</a>
    </form>
  </div>
</div>
{% endblock %}
